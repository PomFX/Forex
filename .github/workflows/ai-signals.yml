name: AI Signal Generator

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run AI Signal Generator
        run: node scripts/ai-signals.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_SIGNAL_API_KEY: ${{ secrets.AI_SIGNAL_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

  evaluate:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Evaluate Active Signals
        run: node scripts/evaluate-signals.js
        env:
          AI_SIGNAL_API_KEY: ${{ secrets.AI_SIGNAL_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

  article:
    runs-on: ubuntu-latest
    needs: evaluate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Generate Gold Analysis Article
        run: node scripts/ai-article.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_SIGNAL_API_KEY: ${{ secrets.AI_SIGNAL_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
